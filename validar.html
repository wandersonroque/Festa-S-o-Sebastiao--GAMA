<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Manual - Facilita Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 50px; }
        header { background: #ea1d2c; padding: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        #reader { width: 100%; max-width: 450px; margin: 15px auto; border-radius: 20px; overflow: hidden; border: 3px solid #333; }
        
        .result-card {
            background: #fff; color: #333; width: 90%; max-width: 400px; margin: 20px auto;
            border-radius: 20px; padding: 25px; display: none; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: pop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .item-name { font-size: 1.8rem; font-weight: 800; color: #ea1d2c; margin-bottom: 10px; text-transform: uppercase; }
        .item-info { font-size: 1rem; color: #666; margin-bottom: 20px; }
        
        .btn-confirm {
            background: #27ae60; color: white; border: none; width: 100%; padding: 20px;
            border-radius: 15px; font-weight: 800; font-size: 1.2rem; cursor: pointer;
        }
        .btn-cancel { background: #eee; color: #666; border: none; width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: 600; }

        .status-msg { margin-top: 15px; font-weight: 700; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #27ae60; color: white; }
        .error { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; font-size: 1.1rem;">VALIDADOR DE TICKETS</h2>
    </header>

    <div id="reader"></div>

    <!-- CARD QUE APARECE APÓS LER -->
    <div id="result-card" class="result-card">
        <div id="card-content">
            <p style="margin:0; font-size: 0.8rem; color: #999;">PRODUTO IDENTIFICADO:</p>
            <div id="display-item" class="item-name">---</div>
            <div id="display-info" class="item-info">ID: #0000</div>
            
            <button id="confirm-btn" class="btn-confirm">ENTREGAR AGORA</button>
            <button onclick="resetScanner()" class="btn-cancel">CANCELAR</button>
        </div>
        <div id="feedback-msg" class="status-msg"></div>
    </div>

<script>
    const SUPABASE_URL = "https://ttmwwvqowcuxmtdwlyms.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXd3dnFvd2N1eG10ZHdseW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTc5NjcsImV4cCI6MjA5Mjk3Mzk2N30.G88ljgeVsjapjmT2KhboaQiAPtwxhde35Cgxis7sc4w";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let html5QrCode;
    let currentTicketId = null;

    async function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess
        );
    }

    async function onScanSuccess(decodedText) {
        // Pausa o scanner para não ler outros enquanto o funcionário decide
        await html5QrCode.pause();
        
        try {
            const partes = decodedText.split('_');
            if (partes[0] !== "VALIDAR") throw new Error("QR CODE INVÁLIDO");

            currentTicketId = partes[1];

            // Busca os dados do item
            const { data, error } = await _supabase
                .from('vendas')
                .select('status, itens, token')
                .eq('id', currentTicketId)
                .single();

            if (error || !data) throw new Error("NÃO ENCONTRADO");
            if (data.status === 'ENTREGUE') throw new Error("ESTE TICKET JÁ FOI UTILIZADO!");

            // Mostra o card com o item
            document.getElementById('display-item').innerText = data.itens;
            document.getElementById('display-info').innerText = `TOKEN: #${data.token}`;
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('confirm-btn').onclick = () => entregarTicket(currentTicketId);

        } catch (e) {
            alert(e.message);
            resetScanner();
        }
    }

    async function entregarTicket(id) {
        const btn = document.getElementById('confirm-btn');
        btn.innerText = "PROCESSANDO...";
        btn.disabled = true;

        const { error } = await _supabase
            .from('vendas')
            .update({ status: 'ENTREGUE' })
            .eq('id', id);

        if (!error) {
            const msg = document.getElementById('feedback-msg');
            msg.innerText = "ENTREGA REALIZADA COM SUCESSO!";
            msg.className = "status-msg success";
            msg.style.display = "block";
            
            setTimeout(() => {
                resetScanner();
            }, 2000);
        } else {
            alert("Erro ao salvar entrega.");
            btn.disabled = false;
        }
    }

    function resetScanner() {
        document.getElementById('result-card').style.display = 'none';
        document.getElementById('feedback-msg').style.display = "none";
        document.getElementById('confirm-btn').innerText = "ENTREGAR AGORA";
        document.getElementById('confirm-btn').disabled = false;
        html5QrCode.resume(); // Volta a câmera ao normal
    }

    window.onload = startScanner;
</script>
</body>
</html>
