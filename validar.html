<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validador - Facilita Pedidos</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; border: 2px solid #e63946; border-radius: 15px; overflow: hidden; background: #000; }
        .result-card { display: none; background: white; color: #333; border-radius: 15px; padding: 20px; margin-top: 20px; }
        .btn { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="color: #e63946;">VALIDADOR DE TICKETS</h2>
    <div id="reader"></div>
    <div id="result-card" class="result-card">
        <h2 id="ticket-item"></h2>
        <p id="ticket-info"></p>
        <div id="action-area"></div>
    </div>

    <script>
        // CONFIGURAÇÕES DO SUPABASE
        const SB_URL = "https://ttmwwvqowcuxmtdwlyms.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXd3dnFvd2N1eG10ZHdseW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTc5NjcsImV4cCI6MjA5Mjk3Mzk2N30.G88ljgeVsjapjmT2KhboaQiAPtwxhde35Cgxis7sc4w";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const html5QrCode = new Html5Qrcode("reader");

        async function startScanner() {
            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess
                );
            } catch (err) {
                console.error(err);
                // Se falhar o modo automático, tenta listar as câmeras
                const devices = await Html5Qrcode.getCameras();
                if (devices.length > 0) {
                    await html5QrCode.start(devices[devices.length - 1].id, { fps: 10, qrbox: 250 }, onScanSuccess);
                }
            }
        }

        function onScanSuccess(decodedText) {
            html5QrCode.pause();
            processTicket(decodedText);
        }

        async function processTicket(data) {
            const parts = data.split('_');
            const id = parts[1];
            const token = parts[2];
            
            const card = document.getElementById('result-card');
            card.style.display = 'block';
            document.getElementById('ticket-item').innerText = "Buscando...";

            const { data: venda, error } = await _supabase.from('vendas').select('*').eq('id', id).eq('token', token).single();

            if (venda) {
                document.getElementById('ticket-item').innerText = venda.itens;
                document.getElementById('ticket-info').innerText = `Status: ${venda.status}`;
                document.getElementById('action-area').innerHTML = venda.status === 'PAGO' 
                    ? `<button class="btn" onclick="entregar(${id})">CONFIRMAR ENTREGA</button>`
                    : `<button class="btn" style="background:#666" onclick="reset()">VOLTAR</button>`;
            } else {
                document.getElementById('ticket-item').innerText = "TICKET INVÁLIDO";
                document.getElementById('action-area').innerHTML = `<button class="btn" onclick="reset()">TENTAR NOVAMENTE</button>`;
            }
        }

        async function entregar(id) {
            await _supabase.from('vendas').update({ status: 'ENTREGUE' }).eq('id', id);
            alert("Entregue!");
            reset();
        }

        function reset() {
            document.getElementById('result-card').style.display = 'none';
            html5QrCode.resume();
        }

        startScanner();
    </script>
</body>
</html>
